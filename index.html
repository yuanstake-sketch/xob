<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Drama Player - Manual Quality</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            ::-webkit-scrollbar { width: 5px; }
            ::-webkit-scrollbar-track { background: #1e293b; }
            ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }
            .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        </style>
    </head>
    <body class="bg-slate-900 text-white p-4 font-sans text-sm">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold text-sky-400 flex items-center gap-2">
                    <span>🎬</span> Drama Player
                </h1>
                <button onclick="initApp()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded-full border border-slate-700 transition-colors">
                    Ganti Drama
                </button>
            </div>

            <div class="bg-black rounded-xl overflow-hidden shadow-2xl border border-slate-700 mb-4">
                <video id="videoPlayer" controls autoplay class="w-full aspect-video">
                    <source id="videoSource" src="" type="video/mp4" />
                </video>
            </div>

            <div class="mb-6">
                <h2 id="episodeName" class="font-bold text-lg text-slate-100 truncate">Memilih Episode...</h2>
                <div class="flex justify-between items-center mt-2">
                    <div class="flex items-center gap-2">
                        <label class="text-[10px] uppercase text-slate-500 font-bold">Kualitas:</label>
                        <select id="qualitySelect" onchange="changeQuality()" class="bg-slate-800 text-sky-400 text-xs border border-slate-700 rounded px-2 py-1 outline-none focus:border-sky-500">
                            <option value="">Pilih...</option>
                        </select>
                    </div>
                    <span class="text-[10px] text-sky-500 font-medium flex items-center gap-1 bg-sky-500/10 px-2 py-1 rounded border border-sky-500/20">
                        <span class="w-1.5 h-1.5 bg-sky-500 rounded-full animate-pulse"></span>
                        AUTO-NEXT
                    </span>
                </div>
            </div>

            <hr class="border-slate-800 mb-6" />

            <h3 class="text-xs font-semibold text-slate-500 mb-3 uppercase tracking-widest">Daftar Episode:</h3>
            <div id="episodeGrid" class="grid grid-cols-5 gap-2 max-h-48 overflow-y-auto p-1 mb-6"></div>

            <div id="dramaHeader" class="mt-8 pt-6 border-t border-slate-800 hidden">
                <div class="flex gap-4 items-start">
                    <img id="dramaCover" src="" class="w-20 h-28 object-cover rounded shadow-lg border border-slate-700" />
                    <div class="flex-1">
                        <h1 id="dramaTitle" class="text-lg font-bold text-sky-400 leading-tight mb-1"></h1>
                        <div class="flex flex-wrap gap-1 mb-2" id="dramaTags"></div>
                        <p id="dramaCount" class="text-[10px] text-slate-500"></p>
                    </div>
                </div>
            </div>
        </div>

        <script>
            let dramaData = [];
            let currentIdx = 0;
            let currentAvailableQualities = []; // Menyimpan list kualitas episode aktif

            async function initApp() {
                const bookId = prompt("Masukkan Book ID Drama:", "");
                if (!bookId) return;

                try {
                    const [detailRes, episodesRes] = await Promise.all([
                        fetch(`https://api.sansekai.my.id/api/dramabox/detail?bookId=${bookId}`),
                        fetch(`https://api.sansekai.my.id/api/dramabox/allepisode?bookId=${bookId}`),
                    ]);

                    const detailData = await detailRes.json();
                    const episodesData = await episodesRes.json();

                    renderDetail(detailData);
                    dramaData = episodesData.data || episodesData;

                    if (dramaData.length > 0) {
                        renderGrid();
                        loadVideo(0);
                    }
                } catch (error) {
                    alert("Gagal memuat data drama.");
                }
            }

            function renderDetail(data) {
                const header = document.getElementById("dramaHeader");
                header.classList.remove("hidden");
                document.getElementById("dramaTitle").innerText = data.bookName;
                document.getElementById("dramaCover").src = data.coverWap;
                document.getElementById("dramaCount").innerText = `Total: ${data.chapterCount} Episode`;
                
                const tagContainer = document.getElementById("dramaTags");
                tagContainer.innerHTML = "";
                if (data.tags) {
                    data.tags.slice(0, 3).forEach(tag => {
                        const span = document.createElement("span");
                        span.className = "text-[9px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded border border-slate-700";
                        span.innerText = tag;
                        tagContainer.appendChild(span);
                    });
                }
            }

            function renderGrid() {
                const grid = document.getElementById("episodeGrid");
                grid.innerHTML = "";
                dramaData.forEach((ep, index) => {
                    const btn = document.createElement("button");
                    btn.innerText = index + 1;
                    const isActive = index === currentIdx;
                    btn.className = `aspect-square rounded-lg font-bold border transition-all ${
                        isActive ? "bg-sky-500 border-sky-400 text-white" : "bg-slate-800 border-slate-700 text-slate-500 hover:text-white"
                    }`;
                    btn.onclick = () => loadVideo(index);
                    grid.appendChild(btn);
                });
            }

            async function loadVideo(index) {
                if (!dramaData[index]) return;
                currentIdx = index;
                const episode = dramaData[index];

                if (!episode.cdnList?.[0]?.videoPathList) {
                    alert("Video tidak tersedia.");
                    return;
                }

                // Update List Kualitas yang Tersedia
                currentAvailableQualities = episode.cdnList[0].videoPathList;
                updateQualityDropdown(currentAvailableQualities);

                // Default: Ambil kualitas tertinggi untuk pemutaran pertama
                const defaultVideo = [...currentAvailableQualities].sort((a,b) => b.quality - a.quality)[0];
                
                // Set value dropdown ke kualitas yang dipilih otomatis
                document.getElementById("qualitySelect").value = defaultVideo.videoPath;

                await startPlay(defaultVideo.videoPath, episode.chapterName);
                renderGrid();
                
                // Scroll grid
                const activeBtn = document.querySelectorAll("#episodeGrid button")[index];
                if (activeBtn) activeBtn.scrollIntoView({ behavior: "smooth", block: "center" });
            }

            function updateQualityDropdown(list) {
                const select = document.getElementById("qualitySelect");
                select.innerHTML = "";
                // Sort dari tinggi ke rendah
                const sorted = [...list].sort((a,b) => b.quality - a.quality);
                sorted.forEach(v => {
                    const opt = document.createElement("option");
                    opt.value = v.videoPath;
                    opt.innerText = v.quality + "p";
                    select.appendChild(opt);
                });
            }

            // Fungsi saat user ganti kualitas secara manual
            async function changeQuality() {
                const selectedPath = document.getElementById("qualitySelect").value;
                const currentEpisodeName = dramaData[currentIdx].chapterName;
                if (selectedPath) {
                    await startPlay(selectedPath, currentEpisodeName);
                }
            }

            async function startPlay(url, name) {
                const epNameElem = document.getElementById("episodeName");
                epNameElem.innerHTML = `<span class="text-sky-400 animate-pulse italic text-sm">Mendekripsi Video...</span>`;

                try {
                    const res = await fetch(`https://api.sansekai.my.id/api/dramabox/decrypt?url=${encodeURIComponent(url)}`);
                    const data = await res.json();

                    if (data.success && data.streamUrl) {
                        epNameElem.innerText = name;
                        const video = document.getElementById("videoPlayer");
                        const source = document.getElementById("videoSource");
                        
                        // Simpan posisi detik video saat ini jika user sedang ganti kualitas
                        const currentTime = video.currentTime;

                        source.src = data.streamUrl;
                        video.load();
                        
                        // Kembalikan ke detik yang sama agar nonton tidak mengulang dari nol
                        video.currentTime = currentTime; 
                        
                        video.play().catch(() => console.log("User interaction required"));
                    }
                } catch (e) {
                    epNameElem.innerText = "Gagal Dekripsi ❌";
                }
            }

            document.getElementById("videoPlayer").onended = () => {
                if (currentIdx < dramaData.length - 1) loadVideo(currentIdx + 1);
            };

            initApp();
        </script>
    </body>
</html>
