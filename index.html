<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Drama Player - Multi Quality</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            ::-webkit-scrollbar { width: 5px; }
            ::-webkit-scrollbar-track { background: #1e293b; }
            ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }
            .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        </style>
    </head>
    <body class="bg-slate-900 text-white p-4 font-sans text-sm">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold text-sky-400 flex items-center gap-2">
                    <span>🎬</span> Drama Player
                </h1>
                <button onclick="initApp()" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded-full border border-slate-700 transition-colors">
                    Ganti Drama
                </button>
            </div>

            <div class="bg-black rounded-xl overflow-hidden shadow-2xl border border-slate-700 mb-4 relative">
                <div id="loadingOverlay" class="hidden absolute inset-0 bg-black/60 z-10 flex items-center justify-center">
                    <div class="flex flex-col items-center gap-2">
                        <span class="animate-spin text-2xl text-sky-400">⏳</span>
                        <span class="text-[10px] font-bold text-sky-400 uppercase tracking-widest">Decrypting</span>
                    </div>
                </div>
                <video id="videoPlayer" controls autoplay class="w-full aspect-video">
                    <source id="videoSource" src="" type="video/mp4" />
                </video>
            </div>

            <div class="mb-6">
                <h2 id="episodeName" class="font-bold text-lg text-slate-100 truncate">Pilih Episode...</h2>
                <div class="flex justify-between items-center mt-3 bg-slate-800/50 p-2 rounded-lg border border-slate-700/50">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] uppercase text-slate-400 font-bold">Kualitas:</span>
                        <select id="qualitySelect" onchange="handleManualQualityChange()" class="bg-slate-900 text-sky-400 text-xs border border-slate-700 rounded px-2 py-1 outline-none focus:border-sky-500 cursor-pointer">
                            </select>
                    </div>
                    <div class="flex items-center gap-1.5 bg-sky-500/10 px-2 py-1 rounded border border-sky-500/20">
                         <span class="w-1.5 h-1.5 bg-sky-500 rounded-full animate-pulse"></span>
                         <span class="text-[9px] text-sky-500 font-bold tracking-tight uppercase">Auto-Next</span>
                    </div>
                </div>
            </div>

            <hr class="border-slate-800 mb-6" />

            <h3 class="text-xs font-semibold text-slate-500 mb-3 uppercase tracking-widest">Daftar Episode:</h3>
            <div id="episodeGrid" class="grid grid-cols-5 gap-2 max-h-52 overflow-y-auto p-1 mb-6"></div>

            <div id="dramaHeader" class="mt-8 pt-6 border-t border-slate-800 hidden">
                <div class="flex gap-3 items-start">
                    <img id="dramaCover" src="" class="w-16 h-24 object-cover rounded shadow-lg border border-slate-700" />
                    <div class="flex-1">
                        <h1 id="dramaTitle" class="text-md font-bold text-sky-400 leading-tight mb-1"></h1>
                        <p id="dramaCount" class="text-[10px] text-slate-500 mb-2"></p>
                        <div class="flex flex-wrap gap-1" id="dramaTags"></div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            let dramaData = [];
            let currentIdx = 0;

            async function initApp() {
                const bookId = prompt("Masukkan Book ID Drama:", "");
                if (!bookId) return;

                try {
                    const [detailRes, episodesRes] = await Promise.all([
                        fetch(`https://api.sansekai.my.id/api/dramabox/detail?bookId=${bookId}`),
                        fetch(`https://api.sansekai.my.id/api/dramabox/allepisode?bookId=${bookId}`),
                    ]);

                    const detailData = await detailRes.json();
                    const episodesData = await episodesRes.json();

                    // Sesuai JSON: data ada di property 'data' atau root array
                    dramaData = episodesData.data || episodesData;

                    renderDetail(detailData);
                    
                    if (dramaData.length > 0) {
                        renderGrid();
                        loadEpisode(0); 
                    }
                } catch (error) {
                    alert("Terjadi kesalahan saat memuat data.");
                }
            }

            function renderDetail(data) {
                document.getElementById("dramaHeader").classList.remove("hidden");
                document.getElementById("dramaTitle").innerText = data.bookName;
                document.getElementById("dramaCover").src = data.coverWap;
                document.getElementById("dramaCount").innerText = `Total: ${data.chapterCount} Episode`;
                
                const tagContainer = document.getElementById("dramaTags");
                tagContainer.innerHTML = "";
                if (data.tags) {
                    data.tags.slice(0, 3).forEach(tag => {
                        const span = document.createElement("span");
                        span.className = "text-[8px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded border border-slate-700 uppercase";
                        span.innerText = tag;
                        tagContainer.appendChild(span);
                    });
                }
            }

            function renderGrid() {
                const grid = document.getElementById("episodeGrid");
                grid.innerHTML = "";
                dramaData.forEach((ep, index) => {
                    const btn = document.createElement("button");
                    btn.innerText = index + 1;
                    const isActive = index === currentIdx;
                    btn.className = `aspect-square rounded-lg font-bold border transition-all ${
                        isActive ? "bg-sky-500 border-sky-400 text-white shadow-lg shadow-sky-900/40 scale-95" : "bg-slate-800 border-slate-700 text-slate-500 hover:bg-slate-700 hover:text-white"
                    }`;
                    btn.onclick = () => loadEpisode(index);
                    grid.appendChild(btn);
                });
            }

            async function loadEpisode(index) {
                if (!dramaData[index]) return;
                currentIdx = index;
                const episode = dramaData[index];

                // Membedah cdnList -> videoPathList sesuai JSON kamu
                const videoList = episode.cdnList?.[0]?.videoPathList;
                if (!videoList) {
                    alert("Kualitas video tidak ditemukan.");
                    return;
                }

                // Update Dropdown Kualitas
                const select = document.getElementById("qualitySelect");
                select.innerHTML = "";
                
                // Urutkan kualitas dari tertinggi (1080 -> 720 -> dst)
                const sorted = [...videoList].sort((a,b) => b.quality - a.quality);
                
                sorted.forEach(v => {
                    const opt = document.createElement("option");
                    opt.value = v.videoPath;
                    opt.innerText = v.quality + "p";
                    select.appendChild(opt);
                });

                // Pilih kualitas tertinggi secara default
                const defaultPath = sorted[0].videoPath;
                select.value = defaultPath;

                await decryptAndPlay(defaultPath, episode.chapterName);
                renderGrid();

                const activeBtn = document.querySelectorAll("#episodeGrid button")[index];
                if (activeBtn) activeBtn.scrollIntoView({ behavior: "smooth", block: "center" });
            }

            async function handleManualQualityChange() {
                const selectedPath = document.getElementById("qualitySelect").value;
                const chapterName = dramaData[currentIdx].chapterName;
                
                const video = document.getElementById("videoPlayer");
                const lastTime = video.currentTime; // Simpan posisi nonton

                await decryptAndPlay(selectedPath, chapterName, lastTime);
            }

            async function decryptAndPlay(url, name, seekTo = 0) {
                const epNameElem = document.getElementById("episodeName");
                const loading = document.getElementById("loadingOverlay");
                
                loading.classList.remove("hidden");
                epNameElem.innerHTML = `<span class="text-sky-500 italic text-sm animate-pulse">Memproses Dekripsi...</span>`;

                try {
                    const res = await fetch(`https://api.sansekai.my.id/api/dramabox/decrypt?url=${encodeURIComponent(url)}`);
                    const data = await res.json();

                    if (data.success && data.streamUrl) {
                        epNameElem.innerText = name;
                        const video = document.getElementById("videoPlayer");
                        const source = document.getElementById("videoSource");

                        source.src = data.streamUrl;
                        video.load();
                        
                        // Lanjutkan dari detik terakhir jika ganti kualitas
                        video.currentTime = seekTo; 
                        
                        video.play().catch(() => console.log("Menunggu interaksi user"));
                    } else {
                        throw new Error("Gagal mendapatkan streamUrl");
                    }
                } catch (e) {
                    epNameElem.innerText = "Error: Dekripsi Gagal ❌";
                } finally {
                    loading.classList.add("hidden");
                }
            }

            document.getElementById("videoPlayer").onended = () => {
                if (currentIdx < dramaData.length - 1) loadEpisode(currentIdx + 1);
            };

            initApp();
        </script>
    </body>
</html>
