<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DramaBox JSON Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-5">

    <div class="max-w-3xl mx-auto bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700">
        <h1 class="text-2xl font-bold text-sky-400 mb-4 flex items-center gap-2">
            <span>⚙️</span> JSON Generator
        </h1>

        <div class="flex flex-col gap-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Custom Book ID:</label>
                <div class="flex gap-2">
                    <input 
                        type="text" 
                        id="bookIdInput" 
                        value=""
                        class="bg-slate-900 border border-slate-600 text-white px-4 py-2 rounded-lg flex-1 focus:outline-none focus:border-sky-500"
                        placeholder="Masukkan Book ID..."
                    >
                    <button 
                        onclick="generateJSON()" 
                        id="btnFetch"
                        class="bg-sky-600 hover:bg-sky-500 text-white font-bold px-6 py-2 rounded-lg transition-all"
                    >
                        Generate JSON
                    </button>
                </div>
            </div>
        </div>

        <div class="relative">
            <label class="block text-sm font-medium text-slate-400 mb-1">Result JSON:</label>
            <div id="loading" class="hidden absolute inset-0 bg-slate-800/80 flex items-center justify-center z-10">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-sky-500"></div>
            </div>
            <textarea 
                id="jsonOutput" 
                readonly
                class="w-full h-80 bg-black border border-slate-700 text-green-400 font-mono text-sm p-4 rounded-lg focus:outline-none"
                placeholder="Hasil JSON akan muncul di sini..."
            ></textarea>
        </div>

        <div class="mt-4 flex justify-between items-center">
            <p id="statusMsg" class="text-sm text-slate-500 italic">Siap untuk mengambil data.</p>
            <button 
                onclick="copyToClipboard()"
                class="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-1 rounded border border-slate-600"
            >
                Salin JSON
            </button>
        </div>
    </div>

    <script>
        async function generateJSON() {
            const bookId = document.getElementById('bookIdInput').value;
            const output = document.getElementById('jsonOutput');
            const btn = document.getElementById('btnFetch');
            const loading = document.getElementById('loading');
            const status = document.getElementById('statusMsg');

            if (!bookId) {
                alert("Masukkan Book ID terlebih dahulu!");
                return;
            }

            // Reset UI
            output.value = "";
            loading.classList.remove('hidden');
            btn.disabled = true;
            status.innerText = "Sedang mengambil data...";

            try {
                const response = await fetch(`https://api.sansekai.my.id/api/dramabox/allepisode?bookId=${bookId}`);
                
                if (!response.ok) throw new Error("Gagal mengambil data dari server.");

                const data = await response.json();

                // Format JSON agar rapi (indentasi 4 spasi)
                // Jika API membungkus data dalam properti tertentu, sesuaikan di sini
                // Contoh: data.data atau data.results
                const finalData = data.data || data; 
                
                output.value = JSON.stringify(finalData, null, 4);
                status.innerText = "Berhasil digenerate!";
            } catch (error) {
                console.error(error);
                output.value = "ERROR: " + error.message;
                status.innerText = "Terjadi kesalahan.";
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function copyToClipboard() {
            const copyText = document.getElementById("jsonOutput");
            copyText.select();
            document.execCommand("copy");
            alert("JSON telah disalin ke clipboard!");
        }
    </script>
</body>
</html>
